services:
  - type: web
    name: conferente-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DATABASE_URL
        value: sqlite+aiosqlite:////tmp/conferente.db
      - key: CORS_ALLOW_ALL
        value: "true"
